services:
  api:
    build: .
    container_name: gopay_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis
    env_file:
      - .env

  postgres:
    image: postgres:16
    container_name: gopay_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gopay
      POSTGRES_PASSWORD: gopay123
      POSTGRES_DB: gopay_db
    ports:
      - "5432:5432"
    volumes:
      - gopay_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: gopay_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  gopay_postgres_data: